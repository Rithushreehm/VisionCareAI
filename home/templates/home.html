<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionCart AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f8ff;
        }

        .hero{
            background:linear-gradient(135deg,#2563eb,#1e40af);
            color:white;
            padding:60px 20px;
            border-radius:0 0 30px 30px;
        }

        .upload-card{
            max-width:700px;
            margin:auto;
            margin-top:-40px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        #preview{
            display:none;
            width:250px;
            border-radius:15px;
            margin-top:20px;
        }

        .btn-analyze{
            width:100%;
            padding:12px;
            font-size:18px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="hero text-center">

    <h1 class="display-4 fw-bold">
        VisionCart AI
    </h1>

    <p class="lead">
        AI Powered Product Understanding System
    </p>

    <p>
        Upload a product image and automatically generate
        the product category and description using
        <strong>Vision AI Model</strong>.
    </p>

</div>


<div class="container">

<div class="upload-card">

<form action="/result/" method="POST" enctype="multipart/form-data">

    {% csrf_token %}

    <label class="form-label fw-bold">
        Upload Product Image
    </label>

    <input
        type="file"
        class="form-control"
        accept="image/*"
        id="imageInput"
        name="image"
    >

    <center>

        <img id="preview">

    </center>

    <br>

    <button class="btn btn-primary btn-analyze">

        Analyze Product

    </button>

</form>

</div>

</div>


<script>

const input=document.getElementById("imageInput");

const preview=document.getElementById("preview");

input.onchange=function(){

    preview.src=URL.createObjectURL(input.files[0]);

    preview.style.display="block";

}

</script>

</body>
</html>
